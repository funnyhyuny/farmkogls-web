<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 116" width="124" height="116" role="img" aria-label="FES Far East Shipping">
  <defs>
    <clipPath id="fesSh">
      <path d="M22 8 Q62 5 102 8 Q118 9 118 27 C118 60 101 88 62 109 C23 88 6 60 6 27 Q6 9 22 8 Z"/>
    </clipPath>
    <filter id="fesShadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.5" flood-color="#0a2950" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g clip-path="url(#fesSh)">
    <!-- 좌: 밝은 블루 / 우: 진한 블루 (뚜렷한 세로 2톤) -->
    <rect x="0" y="0" width="62" height="116" fill="#357fc9"/>
    <rect x="62" y="0" width="62" height="116" fill="#15488c"/>
    <!-- 상단 광택 -->
    <rect x="0" y="0" width="124" height="46" fill="#ffffff" opacity="0.10"/>
  </g>
  <text x="62" y="50" text-anchor="middle" dominant-baseline="central" filter="url(#fesShadow)"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-weight="800"
        font-size="37" letter-spacing="-1.5" fill="#ffffff">FES</text>
</svg>
