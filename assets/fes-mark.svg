<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 88" width="128" height="88" role="img" aria-label="FES Far East Shipping">
  <defs>
    <clipPath id="fesLens"><path d="M8 44 Q64 -30 120 44 Q64 118 8 44 Z"/></clipPath>
    <filter id="fesSh" x="-15%" y="-30%" width="130%" height="160%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.5" flood-color="#0a2a52" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g clip-path="url(#fesLens)">
    <!-- 좌: 밝은 블루 / 우: 진한 블루 (뚜렷한 세로 2톤) -->
    <rect x="0" y="0" width="64" height="88" fill="#3a82d3"/>
    <rect x="64" y="0" width="64" height="88" fill="#16417e"/>
    <!-- 상단 광택 -->
    <rect x="0" y="0" width="128" height="30" fill="#ffffff" opacity="0.10"/>
  </g>
  <text x="64" y="47" text-anchor="middle" dominant-baseline="central" filter="url(#fesSh)"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-weight="800"
        font-size="43" fill="#ffffff">FES</text>
</svg>
